<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda Kelas – Sistem Manajemen Kelas</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/agenda_admin.css') }}">
</head>

<body>

    <!-- SIDEBAR -->
  {% include 'components/sidebar.html' %}


  <!-- MAIN CONTENT -->
  <main class="main">
    <div class="calendar-card">

      <!-- Calendar Header -->
      <div class="cal-header">
        <button class="nav-btn" id="prevBtn" onclick="changeMonth(-1)">&#8249;</button>
        <div class="cal-title" id="calTitle"></div>
        <button class="nav-btn" id="nextBtn" onclick="changeMonth(1)">&#8250;</button>
      </div>

      <!-- Calendar Grid -->
      <div class="cal-grid" id="calGrid">
        <div class="day-header">Minggu</div>
        <div class="day-header">Senin</div>
        <div class="day-header">Selasa</div>
        <div class="day-header">Rabu</div>
        <div class="day-header">Kamis</div>
        <div class="day-header">Jumat</div>
        <div class="day-header">Sabtu</div>
      </div>

      <!-- Agenda Summary Button -->
      <a class="agenda-btn" href="/agenda">
        <div class="agenda-btn-left">
          <span class="agenda-btn-label">Agenda Bulan Ini</span>
          <span class="agenda-btn-count" id="agendaCount"></span>
        </div>
        <div class="agenda-btn-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <polyline points="9 18 15 12 9 6" />
          </svg>
        </div>
      </a>

    </div>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-date"  id="modalDate"></div>
      <div class="modal-title" id="modalTitle">Agenda</div>
      <div class="modal-agenda-list" id="modalList"></div>
      <div class="modal-footer-btns">
        <button class="modal-close" onclick="hideModal()">Tutup</button>
        <a class="modal-add-btn" id="modalAddBtn" href="#">
          <i class="fas fa-plus"></i> Tambah Agenda
        </a>
      </div>
    </div>
  </div>

  <script>
    const agendaData = {{ agenda|tojson }};
  </script>
  <script src="{{ url_for('static', filename='js/agenda_admin.js') }}"></script>

</body>
</html>
</html>
