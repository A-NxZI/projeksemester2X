<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Sekolah</title>

  <!-- Font Awesome -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet"
  href="{{ url_for('static', filename='daftar.css') }}">
</head>
<body>

  <div class="container">

    <!-- LEFT -->
    <div class="left">

      <img src="{{ url_for('static', filename='images/daftar.png') }}" alt="gambar">

      <h1>Selamat Datang</h1>

      <p>
        Buat akun baru untuk mulai menggunakan
        sistem sekolah dengan mudah dan aman
      </p>

    </div>

    <!-- RIGHT -->
    <div class="right">

      <h2>Buat akun baru</h2>

      <small>
        Silahkan isi data dibawah ini dengan benar
      </small>

      <!-- FORM -->
      <form method="POST">

        <!-- Kode Sekolah -->
        <div class="form-group">
          <label>Kode Sekolah</label>

          <div class="input-box">
            <i class="fa-solid fa-school"></i>

            <input type="text"
                   name="kode_sekolah"
                   placeholder="Masukkan Kode Sekolah"
                   required>
          </div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label>Email</label>

          <div class="input-box">
            <i class="fa-regular fa-envelope"></i>

            <input type="email"
                   name="email"
                   placeholder="Masukkan Email"
                   required>
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label>Sandi</label>

          <div class="input-box">
            <i class="fa-solid fa-lock"></i>

            <input type="password"
                   name="password"
                   placeholder="Masukkan Password"
                   maxlength="8"
                   required>
          </div>
        </div>

        <!-- Konfirmasi -->
        <div class="form-group">
          <label>Konfirmasi Sandi</label>

          <div class="input-box">
            <i class="fa-solid fa-shield"></i>

            <input type="password"
                   name="konfirmasi"
                   placeholder="Konfirmasi Password"
                   maxlength="8"
                   required>
          </div>
        </div>

        <!-- Username -->
        <div class="form-group">
          <label>Nama Pengguna</label>

          <div class="input-box">
            <i class="fa-solid fa-user"></i>

            <input type="text"
                   name="username"
                   placeholder="Masukkan Username"
                   required>
          </div>
        </div>

        <!-- BUTTON -->
        <button type="submit" class="btn">
        <a href="/beranda_admin">Daftar</a>
        </button>

        <!-- Pesan -->
        <p class="error">
          {{ error }}
        </p>

      </form>

    </div>

  </div>

</body>
</html>
